<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing App</title>

<style>
@page {
    size: A4;
    margin: 0;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    font-weight: bold;
    color: #000;
}

.bg-img {
    display: none;
}

.container {
    width: 180mm;
    margin: auto;
    padding-top: 70mm;
    padding-bottom: 10mm;
    box-sizing: border-box;
}

/* Layout */
.form-row {
    display: flex;
    gap: 20px;
    margin-bottom: 15px;
}

/* INLINE FIELD */
.field-inline {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 50%;
}

.full-width {
    width: 100%;
}

.field-inline label {
    white-space: nowrap;
    font-size: 16px;
}

.field-inline input {
    flex: 1;
    border: none;
    border-bottom: 2px solid #000;
    padding: 6px;
    background: none;
    font-size: 16px;
}

/* ================= TABLE ================= */

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15mm;
    border: 2px solid #000;
    table-layout: fixed;
}

/* Column widths */
th:nth-child(1), td:nth-child(1) { width: 8%; }
th:nth-child(2), td:nth-child(2) { width: 50%; }
th:nth-child(3), td:nth-child(3) { width: 10%; }
th:nth-child(4), td:nth-child(4) { width: 16%; }
th:nth-child(5), td:nth-child(5) { width: 16%; }

/* Bigger table */
th, td {
    padding: 10px 8px;
    border-left: 2px solid #000;
    border-right: 2px solid #000;
    border-top: none;
    border-bottom: none;
    font-size: 16px;
}

thead th {
    border-top: 2px solid #000;
    border-bottom: 2px solid #000;
}

tbody tr:last-child td {
    border-bottom: 2px solid #000;
}

tbody tr:nth-last-child(2) td {
    border-bottom: 2px solid #000;
}

th {
    background-color: rgba(200,200,200,0.6);
}

table input {
    width: 100%;
    border: none;
    background: none;
    font-size: 16px;
    padding: 4px 2px;
}

/* S.No small */
td:first-child input {
    width: 40px;
    text-align: center;
}

/* Right align numbers */
td:nth-child(3) input,
td:nth-child(4) input,
td:nth-child(5) input {
    text-align: right;
}

/* ================= FOOTER ================= */

.footer {
    margin-top: 10mm;
    page-break-inside: avoid;
}

.footer-bottom {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

/* ================= FULL WIDTH PRINT BUTTON ================= */

.print-btn {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;

    padding: 18px 0;
    font-size: 20px;
    text-align: center;

    background: #3b82f6;
    color: white;
    border: none;
    border-top: 2px solid #000;

    cursor: pointer;
    z-index: 9999;

    box-shadow: 0 -2px 8px rgba(0,0,0,0.2);
}

.print-btn:hover {
    background: #2563eb;
}

/* PRINT */

@media print {
    .bg-img {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
    }

    .print-btn {
        display: none;
    }
}
</style>
</head>

<body>

<img src="background.png" class="bg-img">

<div class="container">

    <!-- Name + Date -->
    <div class="form-row">
        <div class="field-inline">
            <label>Name</label>
            <input type="text">
        </div>

        <div class="field-inline">
            <label>Date</label>
            <input type="text">
        </div>
    </div>

    <!-- Address -->
    <div class="field-inline full-width">
        <label>Address</label>
        <input type="text">
    </div>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>S.No.</th>
                <th>Item</th>
                <th>Weight</th>
                <th>Rate</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>

            <tr>
                <td colspan="4" style="text-align:right;">Total ₹</td>
                <td><input id="grand-total" readonly></td>
            </tr>
        </tbody>
    </table>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-bottom">
            <p>ह. क्रेता</p>
            <p>अधिकृत ह.</p>
        </div>
    </div>

</div>

<button class="print-btn" onclick="window.print()">🖨️ Print</button>

<script>
function calculateGrandTotal() {
    let total = 0;

    document.querySelectorAll(".row-total").forEach(input => {
        total += parseFloat(input.value) || 0;
    });

    document.getElementById("grand-total").value = total.toFixed(2);
}

document.addEventListener("input", function(e) {
    if (e.target.classList.contains("row-total")) {
        calculateGrandTotal();
    }
});
</script>

</body>
</html>
