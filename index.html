<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing App</title>

<style>
@page {
    size: A4;
    margin: 0;
}

* {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    font-weight: bold;
    color: #000;
}

.bg-img {
    display: none;
}

.container {
    width: 180mm;
    margin: auto;
    padding-top: 70mm;
    padding-bottom: 80px;
    box-sizing: border-box;
}

/* Layout */
.form-row {
    display: flex;
    gap: 20px;
    margin-bottom: 15px;
}

.field-inline {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 50%;
}

.full-width {
    width: 100%;
}

.field-inline label {
    white-space: nowrap;
    font-size: 16px;
}

.field-inline input {
    flex: 1;
    border: none;
    border-bottom: 2px solid #000;
    padding: 6px;
    background: none;
    font-size: 16px;
    -webkit-appearance: none;
    border-radius: 0;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12mm;
    border: 2px solid #000;
    table-layout: fixed;
}

th:nth-child(1), td:nth-child(1) { width: 8%; }
th:nth-child(2), td:nth-child(2) { width: 46%; }
th:nth-child(3), td:nth-child(3) { width: 14%; }
th:nth-child(4), td:nth-child(4) { width: 16%; }
th:nth-child(5), td:nth-child(5) { width: 16%; }

th, td {
    padding: 10px 8px;
    border-left: 2px solid #000;
    border-right: 2px solid #000;
    font-size: 16px;
}

thead th {
    border-top: 2px solid #000;
    border-bottom: 2px solid #000;
}

tbody tr:last-child td {
    border-bottom: 2px solid #000;
}

tbody tr:nth-last-child(2) td {
    border-bottom: 2px solid #000;
}

th {
    background-color: rgba(200,200,200,0.6);
}

table input {
    width: 100%;
    border: none;
    background: none;
    font-size: 16px;
    -webkit-appearance: none;
    border-radius: 0;
}

td:first-child input {
    width: 40px;
    text-align: center;
}

td:nth-child(3) input,
td:nth-child(4) input,
td:nth-child(5) input {
    text-align: right;
}

/* FOOTER */
.footer {
    display: none;
    margin-top: 2mm;
}

.footer-bottom {
    display: flex;
    justify-content: space-between;
}

/* BUTTON */
.print-btn {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 20px;
    font-size: 20px;
    background: #3b82f6;
    color: white;
    border: none;
    cursor: pointer;
    box-sizing: border-box;
}

/* PRINT */
@media print {

    html, body {
        width: 210mm;
        height: 297mm;
        margin: 0;
        padding: 0;
    }

    /* Background image: use absolute inside a fixed wrapper for Safari compat */
    .bg-img-wrapper {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 210mm;
        height: 297mm;
        z-index: -1;
        overflow: hidden;
    }

    .bg-img {
        display: block;
        width: 210mm;
        height: 297mm;
        object-fit: cover;
        object-position: top left;
    }

    .print-btn {
        display: none !important;
    }

    .footer {
        display: block;
    }

    .container {
        position: relative;
        z-index: 1;
    }

    /* Prevent Safari from adding extra space for inputs */
    input {
        -webkit-appearance: none;
        border-radius: 0;
        box-shadow: none;
    }

    /* Ensure table borders print on Safari */
    table, th, td {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

    th {
        background-color: rgba(200,200,200,0.6) !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
}
</style>
</head>

<body>

<!-- Wrapper needed for Safari print background fix -->
<div class="bg-img-wrapper">
    <img src="background.png" class="bg-img">
</div>

<div class="container">

    <div class="form-row">
        <div class="field-inline">
            <label>Name</label>
            <input type="text">
        </div>

        <div class="field-inline">
            <label>Date</label>
            <input type="text">
        </div>
    </div>

    <div class="field-inline full-width">
        <label>Address</label>
        <input type="text">
    </div>

    <table>
        <thead>
            <tr>
                <th>S.No.</th>
                <th>Item</th>
                <th>Weight</th>
                <th>Rate</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
        
            <tr>
                <td colspan="4" style="text-align:right;">Total ₹</td>
                <td><input id="grand-total" readonly></td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        <div class="footer-bottom">
            <p>ह. क्रेता</p>
            <p>अधिकृत ह.</p>
        </div>
    </div>

</div>

<button class="print-btn" onclick="window.print()">🖨️ Print</button>

<script>
document.addEventListener("input", function(e) {
    if (e.target.classList.contains("row-total")) {
        let total = 0;
        document.querySelectorAll(".row-total").forEach(input => {
            total += parseFloat(input.value) || 0;
        });
        document.getElementById("grand-total").value = total.toFixed(2);
    }
});
</script>

</body>
</html>
