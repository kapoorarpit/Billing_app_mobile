<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing App</title>

<style>

* {
    box-sizing: border-box;
}

@page {
    size: A4;
    margin: 0;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    font-weight: bold;
}

/* 🔥 PAGE WRAPPER */
.page {
    position: relative;
    width: 210mm;
    height: 297mm;
    margin: auto;
}

/* 🔥 BACKGROUND IMAGE (REAL FIX) */
.bg-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 210mm;
    height: 297mm;
    object-fit: cover;
    z-index: 0;
}

/* CONTENT ABOVE BACKGROUND */
.content {
    position: relative;
    z-index: 1;
    width: 180mm;
    margin: auto;
    padding-top: 60mm;
    padding-bottom: 20mm;
}

/* FORM */
.form-row {
    width: 100%;
    margin-bottom: 10px;
}

.field-inline {
    display: inline-block;
    width: 49%;
    vertical-align: top;
}

.full-width {
    width: 100%;
}

.field-inline label {
    display: inline-block;
    width: 70px;
}

.field-inline input {
    width: calc(100% - 80px);
    border: none;
    border-bottom: 2px solid #000;
    padding: 6px;
    background: none;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10mm;
    border: 2px solid #000;
    table-layout: fixed;
}

th, td {
    padding: 8px;
    border: 2px solid #000;
}

th:nth-child(1), td:nth-child(1) { width: 8%; }
th:nth-child(2), td:nth-child(2) { width: 46%; }
th:nth-child(3), td:nth-child(3) { width: 14%; }
th:nth-child(4), td:nth-child(4) { width: 16%; }
th:nth-child(5), td:nth-child(5) { width: 16%; }

th {
    background-color: rgba(200,200,200,0.6);
}

table input {
    width: 100%;
    border: none;
    background: none;
}

td:first-child input {
    text-align: center;
}

td:nth-child(3),
td:nth-child(4),
td:nth-child(5) {
    text-align: right;
}

/* FOOTER */
.footer {
    margin-top: 5mm;
}

.footer-bottom div {
    display: inline-block;
    width: 49%;
}

/* PRINT BUTTON */
.print-btn {
    position: fixed;
    bottom: 0;
    width: 100%;
    padding: 20px;
    font-size: 18px;
    background: #3b82f6;
    color: white;
    border: none;
}

/* PRINT */
@media print {
    .print-btn {
        display: none;
    }

    tr, td {
        page-break-inside: avoid;
    }

    body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
}

</style>
</head>

<body>

<div class="page">

    <!-- ✅ BACKGROUND IMAGE -->
    <img src="background.png" class="bg-img">

    <div class="content">

        <div class="form-row">
            <div class="field-inline">
                <label>Name</label>
                <input type="text">
            </div>

            <div class="field-inline">
                <label>Date</label>
                <input type="text">
            </div>
        </div>

        <div class="field-inline full-width">
            <label>Address</label>
            <input type="text">
        </div>

        <table>
            <thead>
                <tr>
                    <th>S.No.</th>
                    <th>Item</th>
                    <th>Weight</th>
                    <th>Rate</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody>
                <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
                <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
                <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
                <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
                <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
                <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
                <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
                <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
                <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
                <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>

                <tr>
                    <td colspan="4" style="text-align:right;">Total ₹</td>
                    <td><input id="grand-total" readonly></td>
                </tr>
            </tbody>
        </table>

        <div class="footer">
            <br>
            <div class="footer-bottom">
                <div>ह. क्रेता</div>
                <div style="text-align:right;">अधिकृत ह.</div>
            </div>

            <div style="margin-top:5mm;">
                <div>पीले गहने वाली दुकान</div>
                <div>भूल चूक लेनी देनी।</div>
                <div>समस्त विवादों का न्यायिक क्षेत्र बदायूँ ही होगा।</div>
            </div>
        </div>

    </div>
</div>

<button class="print-btn" onclick="window.print()">🖨️ Print</button>

<script>
document.addEventListener("input", function(e) {
    if (e.target.classList.contains("row-total")) {
        let total = 0;
        document.querySelectorAll(".row-total").forEach(input => {
            total += parseFloat(input.value) || 0;
        });
        document.getElementById("grand-total").value = total.toFixed(2);
    }
});
</script>

</body>
</html>
