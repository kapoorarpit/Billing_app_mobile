<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing App</title>

<style>
* {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    box-sizing: border-box;
}

@page {
    size: A4 portrait;
    margin: 0mm;
}

body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    font-weight: bold;
    color: #000;
    background: #fff;
}

/* ── PRINT WRAPPER: one fixed A4 page ── */
.page {
    width: 210mm;
    height: 297mm;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    background-image: url('background.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    background-position: top left;
}

.container {
    width: 180mm;
    margin: 0 auto;
    padding-top: 68mm;
    padding-bottom: 10mm;
}

/* ── FORM FIELDS ── */
.form-row {
    display: flex;
    gap: 20px;
    margin-bottom: 12px;
}

.field-inline {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 50%;
}

.full-width {
    width: 100%;
}

.field-inline label {
    white-space: nowrap;
    font-size: 15px;
}

.field-inline input {
    flex: 1;
    border: none;
    border-bottom: 2px solid #000;
    padding: 4px 6px;
    background: transparent;
    font-size: 15px;
    font-weight: bold;
    outline: none;
    -webkit-appearance: none;
    border-radius: 0;
    min-width: 0;
}

/* ── TABLE ── */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8mm;
    border: 2px solid #000;
    table-layout: fixed;
}

th:nth-child(1), td:nth-child(1) { width: 8%; }
th:nth-child(2), td:nth-child(2) { width: 46%; }
th:nth-child(3), td:nth-child(3) { width: 14%; }
th:nth-child(4), td:nth-child(4) { width: 16%; }
th:nth-child(5), td:nth-child(5) { width: 16%; }

th, td {
    padding: 5px 6px;
    border-left: 2px solid #000;
    border-right: 2px solid #000;
    font-size: 14px;
}

thead th {
    border-top: 2px solid #000;
    border-bottom: 2px solid #000;
    background-color: rgba(200,200,200,0.6);
}

tbody tr td {
    border-bottom: 1px solid #ccc;
}

tbody tr:last-child td,
tbody tr:nth-last-child(2) td {
    border-bottom: 2px solid #000;
}

table input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: bold;
    outline: none;
    -webkit-appearance: none;
    border-radius: 0;
    padding: 0;
}

td:first-child input { text-align: center; }
td:nth-child(3) input,
td:nth-child(4) input,
td:nth-child(5) input { text-align: right; }

/* ── FOOTER ── */
.footer {
    margin-top: 5mm;
}

.footer-bottom {
    display: flex;
    justify-content: space-between;
    font-size: 15px;
}

/* ── SCREEN-ONLY PRINT BUTTON ── */
.print-btn {
    display: block;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 18px;
    font-size: 20px;
    background: #3b82f6;
    color: white;
    border: none;
    cursor: pointer;
    z-index: 999;
}

@media print {
    html {
        margin: 0 !important;
        padding: 0 !important;
    }

    body {
        margin: 0 !important;
        padding: 0 !important;
        width: 210mm !important;
        height: 297mm !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
    }

    .page {
        width: 210mm !important;
        height: 297mm !important;
        margin: 0 !important;
        page-break-after: avoid;
        page-break-inside: avoid;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        background-image: url('background.png') !important;
        background-size: 100% 100% !important;
        background-repeat: no-repeat !important;
    }

    .print-btn {
        display: none !important;
    }
}
</style>
</head>

<body>

<div class="page">
  <div class="container">

    <div class="form-row">
        <div class="field-inline">
            <label>Name</label>
            <input type="text">
        </div>
        <div class="field-inline">
            <label>Date</label>
            <input type="text">
        </div>
    </div>

    <div class="field-inline full-width" style="margin-bottom:12px;">
        <label>Address</label>
        <input type="text">
    </div>

    <table>
        <thead>
            <tr>
                <th>S.No.</th>
                <th>Item</th>
                <th>Weight</th>
                <th>Rate</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr>
                <td colspan="4" style="text-align:right; border-bottom:2px solid #000;">Total ₹</td>
                <td style="border-bottom:2px solid #000;"><input id="grand-total" readonly></td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        <div class="footer-bottom">
            <p style="margin:0;">ह. क्रेता</p>
            <p style="margin:0;">अधिकृत ह.</p>
        </div>
    </div>

  </div>
</div>

<button class="print-btn" onclick="window.print()">🖨️ Print</button>

<script>
document.addEventListener("input", function(e) {
    if (e.target.classList.contains("row-total")) {
        let total = 0;
        document.querySelectorAll(".row-total").forEach(input => {
            total += parseFloat(input.value) || 0;
        });
        document.getElementById("grand-total").value = total.toFixed(2);
    }
});
</script>

</body>
</html>
