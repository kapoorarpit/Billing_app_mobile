.container {
    width: 680px;
    margin: 0 auto;
    padding-top: 255px; /* below the letterhead */
    padding-bottom: 40px;
}

/* Form fields */
.form-row {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
}

.field-inline {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 50%;
}

.full-width { width: 100%; margin-bottom: 14px; }

.field-inline label {
    white-space: nowrap;
    font-size: 15px;
}

.field-inline input {
    flex: 1;
    border: none;
    border-bottom: 2px solid #000;
    padding: 4px 4px;
    background: transparent;
    font-size: 15px;
    font-weight: bold;
    outline: none;
    min-width: 0;
    font-family: Arial, sans-serif;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 30px;
    border: 2px solid #000;
    table-layout: fixed;
}

th:nth-child(1), td:nth-child(1) { width: 8%; }
th:nth-child(2), td:nth-child(2) { width: 46%; }
th:nth-child(3), td:nth-child(3) { width: 14%; }
th:nth-child(4), td:nth-child(4) { width: 16%; }
th:nth-child(5), td:nth-child(5) { width: 16%; }

th, td {
    padding: 12px 6px;
    border-left: 2px solid #000;
    border-right: 2px solid #000;
    font-size: 14px;
}

thead th {
  
    background-color: rgba(200,200,200,0.7);
    text-align: center;
    border-bottom: 2px solid #000;
}



tbody tr:nth-last-child(2) td,
tbody tr:last-child td { border-bottom: 2px solid #000; }

table input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: bold;
    outline: none;
    padding: 0;
    font-family: Arial, sans-serif;
}

td:first-child input { text-align: center; }
td:nth-child(3) input,
td:nth-child(4) input,
td:nth-child(5) input { text-align: right; }

/* Footer signatures */
.footer {
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
    font-size: 15px;
}

/* Bottom button */
.pdf-btn {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%;
    padding: 18px;
    font-size: 20px;
    font-weight: bold;
    background: #16a34a;
    color: white;
    border: none;
    cursor: pointer;
    z-index: 999;
    font-family: Arial, sans-serif;
}

.pdf-btn:disabled {
    background: #6b7280;
    cursor: not-allowed;
}

/* Loading overlay */
#overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    font-size: 22px;
    font-family: Arial, sans-serif;
    font-weight: bold;
    gap: 16px;
}

#overlay.show { display: flex; }

.spinner {
    width: 50px; height: 50px;
    border: 5px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<script>
// Auto grand total
// document.addEventListener("input", function(e) {

async function generatePDF() {
    const btn = document.getElementById('pdf-btn');
    const overlay = document.getElementById('overlay');

    btn.disabled = true;
    overlay.classList.add('show');

    // Small delay so UI updates before heavy canvas work
    await new Promise(r => setTimeout(r, 100));

    try {
        const page = document.getElementById('bill-page');

        const canvas = await html2canvas(page, {
            scale: 2,           // high res
            useCORS: true,
            allowTaint: true,
            backgroundColor: null,
            logging: false,
            width: page.offsetWidth,
            height: page.offsetHeight
        });

        const imgData = canvas.toDataURL('image/jpeg', 0.95);

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
            orientation: 'portrait',
            unit: 'mm',
            format: 'a4'
        });

        // A4 = 210 x 297 mm
        pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
        pdf.save('bill.pdf');

    } catch(err) {
        alert('Error generating PDF: ' + err.message);
    }

    overlay.classList.remove('show');
    btn.disabled = false;
}
</script>
