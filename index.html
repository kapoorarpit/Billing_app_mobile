<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing App</title>

<style>
@page {
    size: A4;
    margin: 0;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    font-weight: bold;
}

/* 🔥 NO HEIGHT HERE */
.container {
    width: 180mm;
    margin: auto;
    padding: 52mm 10mm 8mm 10mm; /* 🔥 tighter */
    box-sizing: border-box;
}

/* Background */
.bg-img {
    display: none;
}

@media print {
    .bg-img {
        display: block;
        position: absolute; /* 🔥 IMPORTANT */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
    }
}

/* Layout */
.form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 6px;
}

.field-inline {
    display: flex;
    gap: 6px;
    width: 50%;
}

.full-width {
    width: 100%;
}

.field-inline input {
    flex: 1;
    border: none;
    border-bottom: 2px solid black;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 3mm; /* 🔥 tighter */
    border: 2px solid black;
}

th:nth-child(1), td:nth-child(1) { width: 8%; }
th:nth-child(2), td:nth-child(2) { width: 46%; }
th:nth-child(3), td:nth-child(3) { width: 14%; }
th:nth-child(4), td:nth-child(4) { width: 16%; }
th:nth-child(5), td:nth-child(5) { width: 16%; }

th, td {
    padding: 5px; /* 🔥 tighter */
    border-left: 2px solid black;
    border-right: 2px solid black;
    font-size: 13px;
}

thead th {
    border-top: 2px solid black;
    border-bottom: 2px solid black;
}

tbody tr:last-child td {
    border-bottom: 2px solid black;
}

tbody tr:nth-last-child(2) td {
    border-bottom: 2px solid black;
}

table input {
    width: 100%;
    border: none;
}

td:first-child input {
    width: 30px;
    text-align: center;
}

/* Footer */
.footer {
    display: none;
    margin-top: 3mm;
}

/* Button */
.print-btn {
    position: fixed;
    bottom: 0;
    width: 100%;
    padding: 18px;
    background: #3b82f6;
    color: white;
    border: none;
}

/* 🔥 PRINT CONTROL */
@media print {

    .print-btn {
        display: none;
    }

    .footer {
        display: block;
    }

    table, .footer {
        page-break-inside: avoid;
    }

    body {
        overflow: hidden;
    }
}
</style>
</head>

<body>

<img src="background.png" class="bg-img">

<div class="container">

    <div class="form-row">
        <div class="field-inline">
            <label>Name</label>
            <input>
        </div>

        <div class="field-inline">
            <label>Date</label>
            <input>
        </div>
    </div>

    <div class="field-inline full-width">
        <label>Address</label>
        <input>
    </div>

    <table>
        <thead>
            <tr>
                <th>S.No.</th>
                <th>Item</th>
                <th>Weight</th>
                <th>Rate</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody>
            <!-- 🔥 KEEP 6–7 ROWS ONLY -->
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td></tr>

            <tr>
                <td colspan="4" style="text-align:right;">Total ₹</td>
                <td><input></td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        <div style="display:flex; justify-content:space-between;">
            <p>ह. क्रेता</p>
            <p>अधिकृत ह.</p>
        </div>
    </div>

</div>

<button class="print-btn" onclick="window.print()">🖨️ Print / Save PDF</button>

</body>
</html>
