<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing App</title>

<style>

/* GLOBAL */
* {
    box-sizing: border-box;
}

@page {
    size: A4;
    margin: 0;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    font-weight: bold;
    color: #000;
}

/* CONTAINER */
.container {
    width: 180mm;
    margin: auto;
    padding-top: 60mm;
    padding-bottom: 20mm;
}

/* FORM LAYOUT (NO FLEX) */
.form-row {
    width: 100%;
    margin-bottom: 10px;
}

.field-inline {
    display: inline-block;
    width: 49%;
    vertical-align: top;
}

.full-width {
    width: 100%;
}

.field-inline label {
    display: inline-block;
    width: 70px;
    font-size: 16px;
}

.field-inline input {
    width: calc(100% - 80px);
    border: none;
    border-bottom: 2px solid #000;
    padding: 6px;
    background: none;
    font-size: 16px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10mm;
    border: 2px solid #000;
    table-layout: fixed;
}

th, td {
    padding: 8px;
    border: 2px solid #000;
    font-size: 16px;
}

th:nth-child(1), td:nth-child(1) { width: 8%; }
th:nth-child(2), td:nth-child(2) { width: 46%; }
th:nth-child(3), td:nth-child(3) { width: 14%; }
th:nth-child(4), td:nth-child(4) { width: 16%; }
th:nth-child(5), td:nth-child(5) { width: 16%; }

th {
    background-color: rgba(200,200,200,0.6);
}

table input {
    width: 100%;
    border: none;
    background: none;
    font-size: 16px;
}

/* ALIGNMENT */
td:first-child input {
    text-align: center;
}

td:nth-child(3) input,
td:nth-child(4) input,
td:nth-child(5) input {
    text-align: right;
}

/* FOOTER */
.footer {
    display: none;
    margin-top: 5mm;
}

.footer-bottom div {
    display: inline-block;
    width: 49%;
}

/* PRINT BUTTON */
.print-btn {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 20px;
    font-size: 20px;
    background: #3b82f6;
    color: white;
    border: none;
    cursor: pointer;
}

/* PRINT FIX (IMPORTANT) */
@media print {

    html, body {
        width: 210mm;
    }

    body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

    .print-btn {
        display: none;
    }

    .footer {
        display: block;
    }

    tr, td, th {
        page-break-inside: avoid;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="form-row">
        <div class="field-inline">
            <label>Name</label>
            <input type="text">
        </div>

        <div class="field-inline">
            <label>Date</label>
            <input type="text">
        </div>
    </div>

    <div class="field-inline full-width">
        <label>Address</label>
        <input type="text">
    </div>

    <table>
        <thead>
            <tr>
                <th>S.No.</th>
                <th>Item</th>
                <th>Weight</th>
                <th>Rate</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody>

            <!-- ROWS -->
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input class="row-total"></td></tr>

            <!-- TOTAL -->
            <tr>
                <td colspan="4" style="text-align:right;">Total ₹</td>
                <td><input id="grand-total" readonly></td>
            </tr>

        </tbody>
    </table>

    <div class="footer">
        <br>
        <div class="footer-bottom">
            <div>ह. क्रेता</div>
            <div style="text-align:right;">अधिकृत ह.</div>
        </div>

        <div style="margin-top:5mm;">
            <div>पीले गहने वाली दुकान</div>
            <div>भूल चूक लेनी देनी।</div>
            <div>समस्त विवादों का न्यायिक क्षेत्र बदायूँ ही होगा।</div>
        </div>
    </div>

</div>

<button class="print-btn" onclick="window.print()">🖨️ Print</button>

<script>
document.addEventListener("input", function(e) {
    if (e.target.classList.contains("row-total")) {
        let total = 0;
        document.querySelectorAll(".row-total").forEach(input => {
            total += parseFloat(input.value) || 0;
        });
        document.getElementById("grand-total").value = total.toFixed(2);
    }
});
</script>

</body>
</html>
