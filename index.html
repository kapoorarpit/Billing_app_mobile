<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing App</title>

<style>
@page {
    size: A4;
    margin: 0;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    font-weight: bold;
}

/* 🔥 EXACT SAFE WIDTH */
.container {
    width: 178mm;   /* slightly reduced */
    margin: auto;
    padding: 48mm 8mm 6mm 8mm;  /* 🔥 tighter */
    box-sizing: border-box;
}

/* Background */
.bg-img {
    display: none;
}

@media print {
    .bg-img {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 210mm;
        height: 297mm;
        z-index: -1;
    }
}

/* Header */
.form-row {
    display: flex;
    gap: 6px;
    margin-bottom: 4px;
}

.field-inline {
    display: flex;
    gap: 5px;
    width: 50%;
}

.field-inline input {
    flex: 1;
    border: none;
    border-bottom: 2px solid black;
}

.full-width {
    width: 100%;
    margin-bottom: 4px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 2mm;  /* 🔥 reduced */
    border: 2px solid black;
}

th, td {
    padding: 4px;   /* 🔥 critical reduction */
    font-size: 12px; /* 🔥 slightly smaller */
    border-left: 2px solid black;
    border-right: 2px solid black;
}

thead th {
    border-top: 2px solid black;
    border-bottom: 2px solid black;
}

tbody tr:last-child td {
    border-bottom: 2px solid black;
}

/* Inputs */
table input {
    width: 100%;
    border: none;
}

/* Footer */
.footer {
    display: none;
    margin-top: 2mm;
}

/* Button */
.print-btn {
    position: fixed;
    bottom: 0;
    width: 100%;
    padding: 18px;
    background: #3b82f6;
    color: white;
    border: none;
}

/* Print */
@media print {

    .print-btn {
        display: none;
    }

    .footer {
        display: block;
    }

    body {
        overflow: hidden;
    }
}
</style>
</head>

<body>

<img src="background.png" class="bg-img">

<div class="container">

    <div class="form-row">
        <div class="field-inline">
            <label>Name</label>
            <input>
        </div>

        <div class="field-inline">
            <label>Date</label>
            <input>
        </div>
    </div>

    <div class="field-inline full-width">
        <label>Address</label>
        <input>
    </div>

    <table>
        <thead>
            <tr>
                <th>S.No.</th>
                <th>Item</th>
                <th>Weight</th>
                <th>Rate</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody>
            <!-- 🔥 MAX 6 ROWS -->
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
            <tr><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td></tr>

            <tr>
                <td colspan="4" style="text-align:right;">Total ₹</td>
                <td><input></td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        <div style="display:flex; justify-content:space-between;">
            <p>ह. क्रेता</p>
            <p>अधिकृत ह.</p>
        </div>
    </div>

</div>

<button class="print-btn" onclick="window.print()">🖨️ Print / Save PDF</button>

</body>
</html>
